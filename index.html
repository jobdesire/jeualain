<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu Alain - Typing Game</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white; font-family: sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }
        #welcome-screen, #game-screen, #game-over-screen {
            text-align: center; background: rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%; max-width: 500px;
        }
        h1 { margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .menu-btn {
            color: white; border: none;
            padding: 15px 30px; font-size: 18px; font-weight: bold;
            border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.2s; margin: 10px; width: 80%;
        }
        .menu-btn:hover { transform: scale(1.05); }
        .btn-facile { background-color: #10ac84; }
        .btn-normal { background-color: #ff9f43; }
        .btn-difficile { background-color: #ee5253; }
        .btn-quitter {
            background-color: #747d8c; color: white; border: none;
            padding: 8px 15px; font-size: 14px; font-weight: bold;
            border-radius: 15px; cursor: pointer; margin-top: 15px;
            transition: 0.2s;
        }
        .btn-quitter:hover { background-color: #57606f; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 18px; }
        #game-area {
            position: relative; width: 100%; height: 300px;
            background-color: rgba(0, 0, 0, 0.2); border-radius: 10px;
            overflow: hidden; margin-bottom: 20px;
        }
        .falling-char {
            position: absolute; font-size: 42px; font-weight: bold;
            color: #1dd1a1; text-shadow: 0 0 15px #1dd1a1;
            width: 100%; text-align: center;
        }
        #mobile-input {
            width: 80%; padding: 12px; font-size: 18px;
            border-radius: 10px; border: none; text-align: center;
        }
        .timer-highlight { color: #ff4757; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>🐬 JEU ALAIN TYPING 🐬</h1>
        <p style="font-size: 18px; margin-bottom: 25px;">Attrape le plus de lettres en 60 secondes !</p>
        <button class="menu-btn btn-facile" onclick="startGame(2)">1) Mode Facile</button>
        <button class="menu-btn btn-normal" onclick="startGame(4)">2) Mode Normal</button>
        <button class="menu-btn btn-difficile" onclick="startGame(8)">3) Mode Difficile</button>
    </div>

    <div id="game-screen" style="display: none;">
        <div class="stats">
            <div>Score: <span id="score" style="color: #1dd1a1; font-weight:bold;">0</span></div>
            <div>Temps: <span id="timer" class="timer-highlight">60s</span></div>
            <div>Précision: <span id="accuracy" style="color: #feca57; font-weight:bold;">100%</span></div>
        </div>
        <div id="game-area"></div>
        <input type="text" id="mobile-input" placeholder="Tape la lettre ici !" autocomplete="off">
        <br>
        <button class="btn-quitter" onclick="stopGame()">Quitter le jeu</button>
    </div>

    <div id="game-over-screen" style="display: none;">
        <h1>⏰ TEMPS ÉCOULÉ ! ⏰</h1>
        <p style="font-size: 22px; margin: 20px 0;">Score Final : <span id="final-score" style="color: #1dd1a1; font-weight:bold; font-size:30px;">0</span></p>
        <p style="font-size: 18px;">Précision : <span id="final-accuracy" style="color: #feca57; font-weight:bold;">100%</span></p>
        <button class="menu-btn btn-facile" onclick="showWelcomeScreen()" style="width:auto;">Rejouer 🔄</button>
    </div>

    <script>
        let score = 0; let total = 0; let currentChar = ""; let charPosition = 0; 
        let gameInterval; let timerInterval;
        let fallSpeed = 4;
        let timeLeft = 60; // Durée du jeu fixée à 60 secondes
        
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        
        const welcomeScreen = document.getElementById('welcome-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const gameArea = document.getElementById('game-area');
        const mobileInput = document.getElementById('mobile-input');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(type) {
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                
                if (type === 'success') {
                    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'erreur') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220.00, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.08);
                } else if (type === 'gameover') {
                    // Son spécial de fin de partie (descendant)
                    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                } else {
                    osc.frequency.setValueAtTime(146.83, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                }
            } catch(e) {}
        }

        function startGame(vitesseChoisie) {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            score = 0; total = 0; timeLeft = 60; // Initialise le temps à 60
            updateStats();
            document.getElementById('timer').innerText = timeLeft + "s";
            
            fallSpeed = vitesseChoisie; 
            welcomeScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            
            mobileInput.value = "";
            setTimeout(() => { mobileInput.focus(); }, 100);
            spawnChar();
            
            if(gameInterval) clearInterval(gameInterval);
            if(timerInterval) clearInterval(timerInterval);
            
            gameInterval = setInterval(updateGame, 50);
            timerInterval = setInterval(updateTimer, 1000); // Décompte toutes les secondes
        }

        function updateTimer() {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            
            if (timeLeft <= 0) {
                endGame();
            }
        }

        function stopGame() {
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            gameScreen.style.display = 'none';
            welcomeScreen.style.display = 'block';
        }

        function endGame() {
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            playBeep('gameover');
            
            // Met à jour les scores de l'écran de fin
            document.getElementById('final-score').innerText = score;
            const accuracy = total > 1 ? Math.round((score / (total - 1)) * 100) : 100;
            document.getElementById('final-accuracy').innerText = accuracy + "%";
            
            gameScreen.style.display = 'none';
            gameOverScreen.style.display = 'block';
        }

        function showWelcomeScreen() {
            gameOverScreen.style.display = 'none';
            welcomeScreen.style.display = 'block';
        }

        function spawnChar() {
            currentChar = chars.charAt(Math.floor(Math.random() * chars.length));
            charPosition = 0;
            gameArea.innerHTML = `<div id="letter" class="falling-char" style="top: 0px;">${currentChar}</div>`;
            total++;
        }

        function updateGame() {
            charPosition += fallSpeed;
            const letterElem = document.getElementById('letter');
            if (letterElem) { letterElem.style.top = charPosition + 'px'; }
            
            if (charPosition > 250) { 
                playBeep('fail');
                spawnChar(); 
                updateStats(); 
            }
        }

        mobileInput.addEventListener('input', (e) => {
            const typed = e.target.value.toUpperCase();
            if (typed.length > 0) {
                const lastChar = typed.charAt(typed.length - 1);
                if (lastChar === currentChar) {
                    score++;
                    playBeep('success');
                    spawnChar();
                } else {
                    playBeep('erreur');
                }
                updateStats();
                mobileInput.value = "";
            }
        });

        function updateStats() {
            document.getElementById('score').innerText = score;
            const accuracy = total > 1 ? Math.round((score / (total - 1)) * 100) : 100;
            document.getElementById('accuracy').innerText = accuracy + "%";
        }
    </script>
</body>
</html>
